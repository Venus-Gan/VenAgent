name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd final
          pip install --upgrade pip
          pip install ruff pytest
          pip install -r requirements.txt

      - name: Lint with Ruff
        run: |
          cd final
          ruff check . --output-format=github

      - name: Run tests (skip heavy integration tests)
        run: |
          cd final
          pytest tests/ -v --tb=short -k "not (neo4j or milvus or elasticsearch or kafka)" || true
